<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GCAT 澳洲代購</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      color: #222;
      background: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    nav {
      margin-top: 15px;
    }

    nav a {
      margin: 0 10px;
      color: #333;
      text-decoration: none;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
      background: #f5f5f5;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #666;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      color: white;
      background: #222;
      text-decoration: none;
      border-radius: 4px;
    }

    .section {
      max-width: 1200px;
      margin: auto;
      padding: 50px 20px;
    }

    .section h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .category {
      padding: 40px 15px;
      text-align: center;
      background: #f7f7f7;
      border-radius: 6px;
    }

    footer {
      padding: 35px 20px;
      text-align: center;
      color: white;
      background: #222;
    }

    @media (max-width: 749px) {
      .hero {
        padding: 55px 20px;
      }

      .hero h2 {
        font-size: 28px;
      }

      .categories {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>GCAT</h1>

    <nav>
      <a href="#">首頁</a>
      <a href="#">保健用品</a>
      <a href="#">嬰幼兒用品</a>
      <a href="#">美妝保養</a>
      <a href="#">聯絡我們</a>
    </nav>
  </header>

  <section class="hero">
    <h2>澳洲人氣商品直送</h2>
    <p>澳洲選品・正品採購・安心出貨</p>
    <a class="button" href="#products">開始選購</a>
  </section>

  <section class="section" id="products">
    <h2>商品分類</h2>

    <div class="categories">
      <div class="category">澳洲保健品</div>
      <div class="category">嬰幼兒用品</div>
      <div class="category">美妝保養</div>
      <div class="category">居家生活</div>
    </div>
  </section>

  <footer>
    © 2026 GCAT 澳洲代購
  </footer>

</body>
</html>
